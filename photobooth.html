<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ID*photobooth</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; font-family:'Georgia',serif; background:#f5f9ff; overflow:hidden; }

  .grid-bg {
    position:fixed; inset:0; z-index:0; background-color:#f7fbff;
    background-image:
      linear-gradient(rgba(150,190,230,0.22) 1px,transparent 1px),
      linear-gradient(90deg,rgba(150,190,230,0.22) 1px,transparent 1px),
      linear-gradient(rgba(150,190,230,0.10) 1px,transparent 1px),
      linear-gradient(90deg,rgba(150,190,230,0.10) 1px,transparent 1px);
    background-size:80px 80px,80px 80px,20px 20px,20px 20px;
    pointer-events:none;
  }

  .screen {
    position:fixed; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; z-index:10;
    opacity:0; pointer-events:none; transition:opacity 0.4s ease;
  }
  .screen.active { opacity:1; pointer-events:all; }

  /* ── SPLASH ── */
  #splash { gap:36px; }
  .logo-wrap { animation:float 3s ease-in-out infinite; user-select:none; }
  .logo-wrap img { width:min(360px,68vw); height:auto; filter:drop-shadow(0 4px 18px rgba(65,105,225,0.16)); }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }

  .start-btn-wrap { cursor:pointer; background:none; border:none; padding:0; transition:transform 0.14s,filter 0.14s; }
  .start-btn-wrap:hover{transform:scale(1.05);filter:brightness(1.06)}
  .start-btn-wrap:active{transform:scale(0.96)}
  .start-btn-wrap img { width:min(260px,52vw); height:auto; display:block; }

  .splash-hint {
    font-size:clamp(0.78rem,2.2vw,0.95rem);
    color:#6a96d8;
    letter-spacing:0.06em;
    font-family:'Georgia',serif;
    background:rgba(255,255,255,0.7);
    border:1px solid rgba(100,160,230,0.3);
    border-radius:30px;
    padding:8px 22px;
    backdrop-filter:blur(4px);
  }

  /* ── CAMERA ── */
  #camera { justify-content:center; }
  .camera-inner { display:flex; flex-direction:column; align-items:center; width:100%; height:100%; padding:16px; gap:10px; justify-content:center; }
  .camera-viewport-wrap { position:relative; width:min(340px,80vw); flex:1 1 0; min-height:0; }
  .camera-viewport { width:100%; height:100%; background:#111; border-radius:8px; overflow:hidden; position:relative; box-shadow:0 4px 28px rgba(65,105,225,0.2); }
  #videoEl { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }

  .strip-preview { display:flex; gap:6px; width:min(340px,80vw); flex-shrink:0; }
  .strip-thumb { flex:1; aspect-ratio:3/4; background:linear-gradient(180deg,#4169e1 0%,#b8d8f0 100%); border-radius:4px; border:2px solid rgba(65,105,225,0.25); overflow:hidden; }
  .strip-thumb img { width:100%; height:100%; object-fit:cover; }
  .strip-thumb.taken { border-color:#4169e1; }

  .shutter-area { display:flex; flex-direction:column; align-items:center; gap:6px; flex-shrink:0; }
  .shot-counter { font-size:0.85rem; color:#4169e1; letter-spacing:0.06em; }
  .shutter-btn { width:58px; height:58px; border-radius:50%; background:linear-gradient(180deg,#7ab3f5 0%,#4169e1 100%); border:4px solid #fff; cursor:pointer; box-shadow:0 4px 20px rgba(65,105,225,0.4),0 0 0 2px rgba(65,105,225,0.25); transition:transform 0.12s; }
  .shutter-btn:hover{transform:scale(1.08)} .shutter-btn:active{transform:scale(0.92)}
  .shutter-btn:disabled{opacity:0.45;cursor:not-allowed;transform:none}

  #countdown { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:30; pointer-events:none; opacity:0; transition:opacity 0.15s; }
  #countdown.show { opacity:1; }
  #countNum { font-size:min(130px,28vw); font-family:'Georgia',serif; font-weight:bold; color:#fff; text-shadow:0 0 40px rgba(65,105,225,0.9),0 4px 20px rgba(0,0,0,0.25); animation:countPop 0.8s ease-out; }
  @keyframes countPop{0%{transform:scale(1.8);opacity:0}40%{opacity:1}100%{transform:scale(1);opacity:1}}

  #camLoading { position:absolute; inset:0; background:rgba(247,251,255,0.95); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; z-index:50; border-radius:8px; }
  #camLoading p { color:#4169e1; font-size:0.85rem; }
  .spinner { width:34px; height:34px; border:4px solid #b8d8f0; border-top-color:#4169e1; border-radius:50%; animation:spin 0.85s linear infinite; }
  @keyframes spin{to{transform:rotate(360deg)}}

  #flashOverlay { position:fixed; inset:0; background:#fff; z-index:999; opacity:0; pointer-events:none; }

  /* ── PROCESSING ── */
  #processingScreen { position:fixed; inset:0; z-index:200; background:rgba(247,251,255,0.97); display:none; flex-direction:column; align-items:center; justify-content:center; gap:24px; }
  #processingScreen.show { display:flex; }
  #processingScreen .proc-logo img { width:min(180px,44vw); animation:float 3s ease-in-out infinite; filter:drop-shadow(0 2px 10px rgba(65,105,225,0.2)); }
  .big-spinner { width:50px; height:50px; border:5px solid #b8d8f0; border-top-color:#4169e1; border-radius:50%; animation:spin 0.9s linear infinite; }
  .proc-steps { display:flex; flex-direction:column; gap:10px; }
  .proc-step { font-size:0.85rem; color:#7aabef; display:flex; align-items:center; gap:10px; opacity:0.35; transition:opacity 0.4s,color 0.4s; }
  .proc-step.active{opacity:1;color:#4169e1;font-weight:bold} .proc-step.done{opacity:0.55;color:#4169e1}
  .step-dot { width:8px; height:8px; border-radius:50%; background:#b8d8f0; flex-shrink:0; }
  .proc-step.active .step-dot{background:#4169e1;animation:pulse 1s ease-in-out infinite} .proc-step.done .step-dot{background:#4169e1}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.6)}}

  /* ── RESULT ── */
  #result { overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; padding:28px 16px 32px; }
  .result-inner { display:flex; flex-direction:column; align-items:center; gap:20px; width:100%; }
  .result-logo img { width:min(200px,46vw); height:auto; filter:drop-shadow(0 2px 8px rgba(65,105,225,0.15)); animation:float 3s ease-in-out infinite; }
  .frame-wrapper { width:min(320px,78vw); }
  #resultImg { width:100%; height:auto; display:block; border-radius:4px; box-shadow:0 8px 40px rgba(65,105,225,0.18); }
  #compositeCanvas { display:none; }
  .result-buttons { display:flex; gap:14px; }
  .result-btn { padding:13px 36px; border-radius:40px; font-size:0.95rem; font-family:'Georgia',serif; letter-spacing:0.06em; border:none; cursor:pointer; transition:transform 0.12s; }
  .save-btn { background:linear-gradient(180deg,#7ab3f5 0%,#4169e1 100%); color:#fff; box-shadow:0 4px 18px rgba(65,105,225,0.38); }
  .retake-btn { background:#fff; color:#4169e1; border:2px solid #4169e1; }
  .result-btn:hover{transform:scale(1.04)} .result-btn:active{transform:scale(0.97)}

  @media(max-height:680px){.camera-inner{gap:6px;padding:10px 16px}.shutter-btn{width:50px;height:50px}}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div id="flashOverlay"></div>

<!-- PROCESSING -->
<div id="processingScreen">
  <div class="proc-logo"><img id="procLogo" src="" alt="ID*photobooth"></div>
  <div class="big-spinner"></div>
  <div class="proc-steps">
    <div class="proc-step" id="step1"><div class="step-dot"></div>사진 준비 중</div>
    <div class="proc-step" id="step2"><div class="step-dot"></div>사진 보정 중</div>
    <div class="proc-step" id="step3"><div class="step-dot"></div>프레임 합성 중</div>
  </div>
</div>

<!-- SPLASH -->
<div class="screen active" id="splash">
  <div class="logo-wrap"><img id="splashLogo" src="" alt="ID*photobooth"></div>
  <button class="start-btn-wrap" onclick="goToCamera()"><img id="startBtnImg" src="" alt="Start"></button>
  <p class="splash-hint">단색 배경 앞에서 촬영해주세요!</p>
</div>

<!-- CAMERA -->
<div class="screen" id="camera">
  <div class="camera-inner">
    <div class="camera-viewport-wrap">
      <div class="camera-viewport">
        <video id="videoEl" autoplay playsinline muted></video>
        <div id="countdown"><span id="countNum">3</span></div>
        <div id="camLoading"><div class="spinner"></div><p>카메라 준비 중...</p></div>
      </div>
    </div>
    <div class="strip-preview">
      <div class="strip-thumb" id="thumb0"></div>
      <div class="strip-thumb" id="thumb1"></div>
      <div class="strip-thumb" id="thumb2"></div>
      <div class="strip-thumb" id="thumb3"></div>
    </div>
    <div class="shutter-area">
      <div class="shot-counter" id="shotCounter">1 / 4</div>
      <button class="shutter-btn" id="shutterBtn" onclick="startCountdown()"></button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="result">
  <div class="result-inner">
    <div class="result-logo"><img id="resultLogo" src="" alt="ID*photobooth"></div>
    <div class="frame-wrapper"><img id="resultImg" src="" alt="result"></div>
    <canvas id="compositeCanvas"></canvas>
    <div class="result-buttons">
      <button class="result-btn save-btn" onclick="savePhoto()">Save</button>
      <button class="result-btn retake-btn" onclick="retakePhoto()">Retake</button>
    </div>
  </div>
</div>

const SLOTS = [
  { x: 153, y:  563, w: 896, h: 1183 },  // top-left
  { x:1115, y:  563, w: 896, h: 1183 },  // top-right
  { x: 153, y: 1823, w: 896, h: 1182 },  // bottom-left
  { x:1115, y: 1823, w: 896, h: 1182 },  // bottom-right
];
const FW = 2168, FH = 3418;

// ── NAV ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.add('active');
  el.scrollTop = 0;
}
async function goToCamera() { showScreen('camera'); await initCamera(); }
function retakePhoto() {
  photos.length = 0; currentShot = 0; updateShotCounter();
  for (let i=0;i<4;i++) {
    const t=document.getElementById('thumb'+i);
    t.innerHTML=''; t.classList.remove('taken');
  }
  document.getElementById('shutterBtn').disabled = false;
  showScreen('camera');
}

// ── CAMERA ──
async function initCamera() {
  const lm = document.getElementById('camLoading');
  lm.style.display = 'flex';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'user', width:{ideal:1280}, height:{ideal:960} }, audio:false
    });
    const v = document.getElementById('videoEl');
    v.srcObject = stream; await v.play();
    lm.style.display = 'none';
  } catch(e) {
    lm.innerHTML='<p style="color:#c44;padding:16px;text-align:center;">카메라 권한이 필요합니다.<br>설정에서 허용해주세요.</p>';
  }
}

const sleep = ms => new Promise(r => setTimeout(r, ms));
function updateShotCounter() {
  document.getElementById('shotCounter').textContent = `${Math.min(currentShot+1,4)} / 4`;
}

async function startCountdown() {
  if (isCapturing) return;
  isCapturing = true;
  document.getElementById('shutterBtn').disabled = true;
  const cdEl=document.getElementById('countdown'), numEl=document.getElementById('countNum');
  for (let n=3;n>=1;n--) {
    numEl.textContent=n; numEl.style.animation='none'; void numEl.offsetWidth;
    numEl.style.animation='countPop 0.8s ease-out';
    cdEl.classList.add('show'); await sleep(900);
  }
  cdEl.classList.remove('show');
  await capturePhoto();
}

async function capturePhoto() {
  const fl=document.getElementById('flashOverlay');
  fl.style.transition='none'; fl.style.opacity='0.9';
  setTimeout(()=>{fl.style.transition='opacity 0.35s ease';fl.style.opacity='0';},80);

  const v=document.getElementById('videoEl');
  const cap=document.createElement('canvas');
  cap.width=v.videoWidth||640; cap.height=v.videoHeight||480;
  const ctx=cap.getContext('2d');
  ctx.translate(cap.width,0); ctx.scale(-1,1);
  ctx.drawImage(v,0,0);
  const dataURL=cap.toDataURL('image/jpeg',0.92);
  photos.push(dataURL);

  const thumb=document.getElementById('thumb'+currentShot);
  const img=document.createElement('img'); img.src=dataURL;
  thumb.innerHTML=''; thumb.appendChild(img); thumb.classList.add('taken');

  currentShot++; updateShotCounter(); isCapturing=false;

  if (currentShot>=MAX_SHOTS) {
    await sleep(300); await processAndShow();
  } else {
    document.getElementById('shutterBtn').disabled=false;
  }
}

// ── PROCESSING ──
function setStep(n) {
  for(let i=1;i<=3;i++){
    const el=document.getElementById('step'+i);
    el.classList.remove('active','done');
    if(i<n) el.classList.add('done');
    else if(i===n) el.classList.add('active');
  }
}

async function processAndShow() {
  document.getElementById('processingScreen').classList.add('show');

  // Step 1: load photos as Image objects
  setStep(1); await sleep(200);
  const imgs = await Promise.all(photos.map(src=>{
    const img=new Image(); img.src=src;
    return new Promise(r=>{img.onload=()=>r(img); img.onerror=()=>r(null);});
  }));

  // Step 2: grade each photo
  setStep(2); await sleep(200);
  const graded = imgs.map(img=>{
    if(!img) return null;
    const c=document.createElement('canvas');
    c.width=img.naturalWidth; c.height=img.naturalHeight;
    const ctx=c.getContext('2d');
    ctx.drawImage(img,0,0);
    applyGrading(ctx,c.width,c.height);
    return c;
  });

  // Step 3: composite
  setStep(3); await sleep(200);
  await composite(graded);

  await sleep(400);
  document.getElementById('processingScreen').classList.remove('show');
  showScreen('result');
}

// ── GRADING: vivid + warm fade + slightly brighter ──
function applyGrading(ctx, w, h) {
  const id=ctx.getImageData(0,0,w,h), d=id.data;
  // brightness 1.22 (살짝 더 밝게), contrast 1.18, saturation 1.30
  const br=1.22, co=1.18, sa=1.30, fR=16, fG=12, fB=8;
  for(let i=0;i<d.length;i+=4){
    let r=d[i], g=d[i+1], b=d[i+2];
    // brightness
    r*=br; g*=br; b*=br;
    // contrast
    r=(r-128)*co+128; g=(g-128)*co+128; b=(b-128)*co+128;
    // saturation via luminance
    const lum=0.2126*r+0.7152*g+0.0722*b;
    r=lum+(r-lum)*sa; g=lum+(g-lum)*sa; b=lum+(b-lum)*sa;
    // warm shadow lift (faded film feel)
    r+=fR*(1-r/255); g+=fG*(1-g/255); b+=fB*(1-b/255);
    // gentle highlight roll-off
    r=255*(1-Math.exp(-r/230)); g=255*(1-Math.exp(-g/238)); b=255*(1-Math.exp(-b/245));
    d[i]  =Math.max(0,Math.min(255,r));
    d[i+1]=Math.max(0,Math.min(255,g));
    d[i+2]=Math.max(0,Math.min(255,b));
  }
  ctx.putImageData(id,0,0);
  // soft glow
  ctx.save();
  ctx.filter='blur(8px)'; ctx.globalAlpha=0.10;
  ctx.globalCompositeOperation='screen';
  ctx.drawImage(ctx.canvas,0,0);
  ctx.restore();
}

// ── COMPOSITE ──
// 1. Draw frame (JPEG) as full background — this shows the grid, logo, text, borders
// 2. Paint each graded photo directly on top of the green (#00ff00) slot areas
//    The green areas are completely replaced by real photos
async function composite(gradedCanvases) {
  const frameImg=new Image();
  frameImg.src=FRAME_SRC;
  await new Promise((res,rej)=>{
    frameImg.onload=res;
    frameImg.onerror=()=>rej(new Error('Frame load failed'));
  });

  const canvas=document.getElementById('compositeCanvas');
  canvas.width=FW; canvas.height=FH;
  const ctx=canvas.getContext('2d');

  // Step A: draw frame as base
  ctx.drawImage(frameImg,0,0,FW,FH);

  // Step B: paint photos into each slot (covers the green areas)
  for(let i=0;i<4;i++){
    const src=gradedCanvases[i];
    if(!src) continue;
    const s=SLOTS[i];

    // cover-fit: fill slot, center-crop excess
    const imgR=src.width/src.height;
    const slotR=s.w/s.h;
    let sw,sh,ox,oy;
    if(imgR>slotR){
      // photo wider → fit height, crop sides
      sh=s.h; sw=sh*imgR; ox=(s.w-sw)/2; oy=0;
    } else {
      // photo taller → fit width, crop top/bottom
      sw=s.w; sh=sw/imgR; ox=0; oy=(s.h-sh)/2;
    }

    ctx.save();
    ctx.beginPath();
    ctx.rect(s.x,s.y,s.w,s.h);  // clip to exact slot
    ctx.clip();
    ctx.drawImage(src, s.x+ox, s.y+oy, sw, sh);
    ctx.restore();
  }

  document.getElementById('resultImg').src=canvas.toDataURL('image/jpeg',0.92);
}

// ── SAVE ──
function savePhoto(){
  const a=document.createElement('a');
  const d=new Date();
  a.download=`IDphotobooth_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.jpg`;
  a.href=document.getElementById('compositeCanvas').toDataURL('image/jpeg',0.92);
  a.click();
}
</script>
